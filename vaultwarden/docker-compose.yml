version: "3.8"

services:
  vaultwarden:
    image: vaultwarden/server:1.30.5
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - "${VAULTWARDEN_PORT:-8443}:8443"
    volumes:
      - vaultwarden_data:/data
      - ./certs/localhost.pem:/ssl/localhost.pem
      - ./certs/localhost-key.pem:/ssl/localhost-key.pem
    environment:
      - SIGNUPS_ALLOWED=${SIGNUPS_ALLOWED:-true}
      - DOMAIN=${DOMAIN:-https://localhost:8443}
      - ROCKET_PORT=8443
      - ROCKET_TLS={certs="/ssl/localhost.pem",key="/ssl/localhost-key.pem"}

volumes:
  vaultwarden_data:
